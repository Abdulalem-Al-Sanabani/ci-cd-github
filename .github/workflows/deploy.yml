name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci

      - name: Build project
        run: npm run build

      - name: Create fallback index page
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            printf '%s\n' \
              '<!doctype html>' \
              '<html lang="en">' \
              '  <head>' \
              '    <meta charset="utf-8" />' \
              '    <meta name="viewport" content="width=device-width, initial-scale=1" />' \
              '    <title>Recipe API</title>' \
              '  </head>' \
              '  <body>' \
              '    <h1>Recipe API Build Deployed</h1>' \
              '    <p>This repository is currently configured as a Node/Express API.</p>' \
              '    <p>GitHub Pages only serves static files, so this page confirms CI/CD deployment.</p>' \
              '  </body>' \
              '</html>' > dist/index.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
