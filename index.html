<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recipe API</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(120deg, #f5f7fa, #e4edf7);
        color: #1f2a37;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        width: min(680px, calc(100% - 2rem));
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin-top: 0;
        font-size: 1.75rem;
      }

      p {
        line-height: 1.6;
      }

      code {
        background: #f1f5f9;
        border: 1px solid #d9e2ec;
        border-radius: 6px;
        padding: 0.15rem 0.4rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Recipe API</h1>
      <p>This repository is configured as a Node/Express API.</p>
      <p>
        If deployed as a static site, this page is served from
        <code>index.html</code>.
      </p>
      <p>Try the API endpoint path: <code>/recipes</code>.</p>
    </main>
  </body>
</html>
